#:schema https://www.schemastore.org/prek.json

default_install_hook_types = ["pre-commit", "pre-push"]

[[repos]]
repo = "local"
hooks = [
  { id = "nextflow-lint",
    name = "Lint Nextflow scripts and fix formatting",
    entry = "nextflow lint",
    language = "system",
    files = '\.nf$|nextflow\.config$',
    args = ["-format", "-sort-declarations", "-spaces", "4", "-harshil-alignment", "-output", "concise"],
    pass_filenames = true,
    require_serial = true,
  },
  { id = "validation-nf-test-snapshot-guard",
    name = "Guard validation nf-test snapshots",
    entry = "scripts/hooks/check_validation_nf_test_snapshots.py",
    language = "python",
    pass_filenames = false,
    files = '\.snap$',
  },
  { id = "gradle-test",
    name = "Run unit tests before push",
    entry = "./gradlew test",
    language = "system",
    pass_filenames = false,
    stages = ["pre-push"],
    verbose = true,
  },
]

[[repos]]
repo = "https://github.com/pre-commit/mirrors-prettier"
rev = "v3.1.0"
hooks = [
  { id = "prettier", additional_dependencies = ["prettier@3.6.2"] },
]

[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v5.0.0"
hooks = [
  { id = "trailing-whitespace", args = ["--markdown-linebreak-ext=md"], exclude = '(?x)^(.*\.snap)$' },
  { id = "end-of-file-fixer", exclude = '(?x)^(.*\.snap)$' },
]
